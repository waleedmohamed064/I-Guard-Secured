services:
  - type: web
    name: iguard-secured
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: iguard-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: iguard-db
    databaseName: iguard
    plan: free
